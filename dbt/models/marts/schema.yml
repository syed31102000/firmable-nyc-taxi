version: 2

models:
  - name: fct_trips
    columns:
      - name: trip_id
        tests:
          - not_null
          - unique
          
      - name: trip_duration_minutes
        tests:
          - trip_duration_range:
              arguments:
                min_value: 1
                max_value: 180

  - name: dim_zones
    columns:
      - name: location_id
        tests:
          - not_null
          - unique

models:
  - name: agg_daily_revenue
    description: Daily trip and revenue summary for valid trips.
    columns:
      - name: trip_date
        tests:
          - not_null
          - unique
      - name: total_trips
        tests:
          - not_null
      - name: total_fare
        tests:
          - not_null

  - name: agg_zone_performance
    description: Monthly pickup zone performance with revenue rank and volume flag.
    columns:
      - name: pickup_year
        tests:
          - not_null
      - name: pickup_month
        tests:
          - not_null
      - name: pickup_zone
        tests:
          - not_null
      - name: revenue_rank
        tests:
          - not_null